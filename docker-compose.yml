services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: youtube-mp3-backend
    restart: unless-stopped
    environment:
      APP_DATA_DIR: /data
      CORS_ALLOWED_ORIGINS: https://ytmp3.reslab.pro
      MAX_DURATION_SECONDS: 7200
      MAX_ACTIVE_JOBS: 2
      JOB_TTL_SECONDS: 3600
      STALE_JOB_SECONDS: 21600
      CLEANUP_INTERVAL_SECONDS: 300
      COMMAND_TIMEOUT_SECONDS: 1800
    volumes:
      - ytmp3_app_data:/data
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5)"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: https://api-ytmp3.reslab.pro
    container_name: youtube-mp3-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  ytmp3_app_data: