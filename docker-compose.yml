services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      APP_DATA_DIR: /data
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    volumes:
      - app_data:/data

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  app_data:
